name: Build OpenWrt Firmware

on:
  workflow_dispatch:
    inputs:
      device:
        description: Device to build
        required: false
        default: all
        type: choice
        options:
          - all
          - xiaomi-redmi-router-ax6s
          - xiaomi-mi-router-cr6609
      openwrt_ref:
        description: OpenWrt git branch or tag
        required: false
        default: openwrt-25.12

permissions:
  contents: read

env:
  DEFAULT_OPENWRT_REF: openwrt-25.12
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  build:
    name: ${{ matrix.device.name }} firmware
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        device:
          - name: xiaomi-redmi-router-ax6s
            target: mediatek
            subtarget: mt7622
            config_device: CONFIG_TARGET_mediatek_mt7622_DEVICE_xiaomi_redmi-router-ax6s
          - name: xiaomi-mi-router-cr6609
            target: ramips
            subtarget: mt7621
            config_device: CONFIG_TARGET_ramips_mt7621_DEVICE_xiaomi_mi-router-cr6609

    steps:
      - name: Decide whether to build this device
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          selected_device="${{ github.event.inputs.device || 'all' }}"
          should_build=false

          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || \
             [ "${selected_device}" = "all" ] || \
             [ "${selected_device}" = "${{ matrix.device.name }}" ]; then
            should_build=true
          fi

          echo "should_build=${should_build}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        if: steps.filter.outputs.should_build == 'true'
        uses: actions/checkout@v4

      - name: Install build dependencies
        if: steps.filter.outputs.should_build == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib \
            g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
            libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz msmtp \
            ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply \
            python3-docutils python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
            swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd

      - name: Resolve build variables
        if: steps.filter.outputs.should_build == 'true'
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          openwrt_ref="${{ github.event.inputs.openwrt_ref || '' }}"
          if [ -z "${openwrt_ref}" ]; then
            openwrt_ref="${DEFAULT_OPENWRT_REF}"
          fi

          echo "openwrt_ref=${openwrt_ref}" >> "${GITHUB_OUTPUT}"

      - name: Clone OpenWrt source
        if: steps.filter.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git clone --depth 1 --branch "${{ steps.vars.outputs.openwrt_ref }}" \
            https://github.com/openwrt/openwrt.git openwrt

      - name: Cache downloads
        if: steps.filter.outputs.should_build == 'true'
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
            .ccache
          key: ${{ runner.os }}-${{ steps.vars.outputs.openwrt_ref }}-${{ matrix.device.name }}
          restore-keys: |
            ${{ runner.os }}-${{ steps.vars.outputs.openwrt_ref }}-

      - name: Configure feeds and files
        if: steps.filter.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail

          cd openwrt

          printf '\nsrc-git openclash https://github.com/vernesong/OpenClash.git\n' >> feeds.conf.default

          ./scripts/feeds update -a
          ./scripts/feeds install -a

          mkdir -p files
          rsync -a "${GITHUB_WORKSPACE}/files/" files/

      - name: Generate .config
        if: steps.filter.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail

          cd openwrt

          cat > .config <<EOF
          CONFIG_TARGET_${{ matrix.device.target }}=y
          CONFIG_TARGET_${{ matrix.device.target }}_${{ matrix.device.subtarget }}=y
          ${{ matrix.device.config_device }}=y
          CONFIG_TARGET_MULTI_PROFILE=n
          CONFIG_TARGET_PER_DEVICE_ROOTFS=y
          CONFIG_DEVEL=n
          CONFIG_CCACHE=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-compat=y
          # CONFIG_PACKAGE_dnsmasq is not set
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_ip-full=y
          CONFIG_PACKAGE_ruby=y
          CONFIG_PACKAGE_ruby-yaml=y
          CONFIG_PACKAGE_unzip=y
          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_PACKAGE_kmod-inet-diag=y
          CONFIG_PACKAGE_kmod-nft-tproxy=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_wpad-basic-mbedtls=y
          CONFIG_PACKAGE_uci=y
          EOF

          make defconfig

      - name: Download sources
        if: steps.filter.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd openwrt
          make download -j"$(nproc)"

      - name: Build firmware
        if: steps.filter.outputs.should_build == 'true'
        shell: bash
        env:
          CCACHE_DIR: ${{ env.CCACHE_DIR }}
        run: |
          set -euo pipefail
          cd openwrt
          make -j"$(nproc)" || make -j1 V=s

      - name: Resolve artifact name
        if: steps.filter.outputs.should_build == 'true'
        id: artifact
        shell: bash
        run: |
          set -euo pipefail

          target_dir="openwrt/bin/targets/${{ matrix.device.target }}/${{ matrix.device.subtarget }}"

          artifact_file="$(find "${target_dir}" -maxdepth 1 -type f -name 'openwrt-*-initramfs-kernel.*' | sort | head -n 1)"

          if [ -z "${artifact_file}" ]; then
            artifact_file="$(find "${target_dir}" -maxdepth 1 -type f -name 'openwrt-*-sysupgrade.*' | sort | head -n 1)"
          fi

          if [ -z "${artifact_file}" ]; then
            artifact_file="$(find "${target_dir}" -maxdepth 1 -type f -name 'openwrt-*' | sort | head -n 1)"
          fi

          if [ -z "${artifact_file}" ]; then
            echo "No OpenWrt artifact found in ${target_dir}" >&2
            exit 1
          fi

          artifact_name="$(basename "${artifact_file}")"
          artifact_name="${artifact_name%.*}"

          echo "artifact_name=${artifact_name}" >> "${GITHUB_OUTPUT}"

      - name: Upload firmware
        if: steps.filter.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: |
            openwrt/bin/targets/${{ matrix.device.target }}/${{ matrix.device.subtarget }}/*
          if-no-files-found: error
          retention-days: 7

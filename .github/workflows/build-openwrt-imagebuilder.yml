name: Build OpenWrt Images

on:
  workflow_dispatch:
    inputs:
      device:
        description: Device to build
        required: false
        default: all
        type: choice
        options:
          - all
          - xiaomi-redmi-router-ax6s
          - xiaomi-mi-router-cr6608
      openwrt_release:
        description: OpenWrt release version
        required: false
        default: 25.12.2
      openclash_release:
        description: OpenClash release tag or latest
        required: false
        default: latest

permissions:
  contents: read

env:
  DEFAULT_OPENWRT_RELEASE: 25.12.2
  DEFAULT_OPENCLASH_RELEASE: latest
  OPENCLASH_FEED_NAME: openclash_custom
  PACKAGES_COMMON: >-
    luci luci-compat
    bash dnsmasq-full ca-bundle curl ip-full ruby ruby-yaml unzip
    kmod-tun kmod-inet-diag kmod-nft-tproxy
    -dnsmasq
    luci-app-openclash

jobs:
  build:
    name: ${{ matrix.device.name }} image
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        device:
          - name: xiaomi-redmi-router-ax6s
            target: mediatek
            subtarget: mt7622
            profile: xiaomi_redmi-router-ax6s
            package_arch: aarch64_cortex-a53
          - name: xiaomi-mi-router-cr6608
            target: ramips
            subtarget: mt7621
            profile: xiaomi_mi-router-cr6608
            package_arch: mipsel_24kc

    steps:
      - name: Decide whether to build this device
        id: filter
        shell: bash
        run: |
          set -euo pipefail

          selected_device="${{ github.event.inputs.device || 'all' }}"
          should_build=false

          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || \
             [ "${selected_device}" = "all" ] || \
             [ "${selected_device}" = "${{ matrix.device.name }}" ]; then
            should_build=true
          fi

          echo "should_build=${should_build}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        if: steps.filter.outputs.should_build == 'true'
        uses: actions/checkout@v4

      - name: Install build dependencies
        if: steps.filter.outputs.should_build == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd libgmp3-dev

      - name: Resolve build variables
        if: steps.filter.outputs.should_build == 'true'
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          openwrt_release="${{ github.event.inputs.openwrt_release || '' }}"
          openclash_release="${{ github.event.inputs.openclash_release || '' }}"

          if [ -z "${openwrt_release}" ]; then
            openwrt_release="${DEFAULT_OPENWRT_RELEASE}"
          fi

          if [ -z "${openclash_release}" ]; then
            openclash_release="${DEFAULT_OPENCLASH_RELEASE}"
          fi

          imagebuilder_name="openwrt-imagebuilder-${openwrt_release}-${{ matrix.device.target }}-${{ matrix.device.subtarget }}.Linux-x86_64"
          imagebuilder_archive="${imagebuilder_name}.tar.zst"
          download_url="https://downloads.openwrt.org/releases/${openwrt_release}/targets/${{ matrix.device.target }}/${{ matrix.device.subtarget }}/${imagebuilder_archive}"

          echo "openwrt_release=${openwrt_release}" >> "${GITHUB_OUTPUT}"
          echo "openclash_release=${openclash_release}" >> "${GITHUB_OUTPUT}"
          echo "imagebuilder_name=${imagebuilder_name}" >> "${GITHUB_OUTPUT}"
          echo "imagebuilder_archive=${imagebuilder_archive}" >> "${GITHUB_OUTPUT}"
          echo "download_url=${download_url}" >> "${GITHUB_OUTPUT}"

      - name: Download ImageBuilder
        if: steps.filter.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail
          curl -fL --retry 5 --retry-delay 5 \
            "${{ steps.vars.outputs.download_url }}" \
            -o "${{ runner.temp }}/${{ steps.vars.outputs.imagebuilder_archive }}"
          tar --zstd -xf "${{ runner.temp }}/${{ steps.vars.outputs.imagebuilder_archive }}" -C "${{ runner.temp }}"

      - name: Prepare local OpenClash feed
        if: steps.filter.outputs.should_build == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          feed_dir="${{ runner.temp }}/openclash-feed"
          mkdir -p "${feed_dir}"

          api_url="https://api.github.com/repos/vernesong/OpenClash/releases/latest"
          if [ "${{ steps.vars.outputs.openclash_release }}" != "latest" ]; then
            api_url="https://api.github.com/repos/vernesong/OpenClash/releases/tags/${{ steps.vars.outputs.openclash_release }}"
          fi

          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "${api_url}" \
            -o "${feed_dir}/release.json"

          asset_url="$(jq -r '.assets[] | select(.name | endswith(".ipk")) | .browser_download_url' "${feed_dir}/release.json" | head -n 1)"
          if [ -z "${asset_url}" ] || [ "${asset_url}" = "null" ]; then
            echo "No .ipk asset found in OpenClash release metadata"
            exit 1
          fi

          asset_name="$(basename "${asset_url}")"
          curl -fL --retry 5 --retry-delay 5 "${asset_url}" -o "${feed_dir}/${asset_name}"

      - name: Build image
        if: steps.filter.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail

          imagebuilder_dir="${{ runner.temp }}/${{ steps.vars.outputs.imagebuilder_name }}"
          feed_dir="${{ runner.temp }}/openclash-feed"
          : > "${feed_dir}/Packages"

          for pkg in "${feed_dir}"/*.ipk; do
            [ -f "${pkg}" ] || continue

            control_archive="$(ar t "${pkg}" | grep '^control\.tar\.' | head -n 1)"
            if [ -z "${control_archive}" ]; then
              echo "Missing control archive in ${pkg}"
              exit 1
            fi

            case "${control_archive}" in
              *.tar.gz) tar_flag="z" ;;
              *.tar.xz) tar_flag="J" ;;
              *.tar.zst) tar_flag="--zstd" ;;
              *.tar.bz2) tar_flag="j" ;;
              *.tar) tar_flag="" ;;
              *)
                echo "Unsupported control archive format: ${control_archive}"
                exit 1
                ;;
            esac

            {
              echo "Filename: $(basename "${pkg}")"
              echo "Size: $(stat -c '%s' "${pkg}")"
              echo "SHA256sum: $(sha256sum "${pkg}" | awk '{print $1}')"

              if [ "${tar_flag}" = "--zstd" ]; then
                ar p "${pkg}" "${control_archive}" | tar --zstd -xOf - ./control
              elif [ -n "${tar_flag}" ]; then
                ar p "${pkg}" "${control_archive}" | tar -xO${tar_flag}f - ./control
              else
                ar p "${pkg}" "${control_archive}" | tar -xOf - ./control
              fi

              echo
            } >> "${feed_dir}/Packages"
          done

          gzip -9nc "${feed_dir}/Packages" > "${feed_dir}/Packages.gz"

          printf '\nsrc/gz %s file://%s\n' "${OPENCLASH_FEED_NAME}" "${feed_dir}" >> "${imagebuilder_dir}/repositories.conf"

          make -C "${imagebuilder_dir}" image \
            PROFILE="${{ matrix.device.profile }}" \
            PACKAGES="${PACKAGES_COMMON}" \
            FILES="${GITHUB_WORKSPACE}/files"

      - name: Upload firmware
        if: steps.filter.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ steps.vars.outputs.openwrt_release }}-${{ matrix.device.name }}-${{ matrix.device.package_arch }}
          path: |
            ${{ runner.temp }}/${{ steps.vars.outputs.imagebuilder_name }}/bin/targets/${{ matrix.device.target }}/${{ matrix.device.subtarget }}/*
          if-no-files-found: error
          retention-days: 7

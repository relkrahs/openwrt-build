name: Build Custom Feed Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CUSTOM_FEED_NAME: custom
  CUSTOM_FEEDS: |
    openclash|https://github.com/vernesong/OpenClash.git|master
  PACKAGES: luci-app-openclash

jobs:
  build:
    name: ${{ matrix.arch }} build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch:
          # - x86_64-24.10.4
          # - mips_24kc-24.10.4
          - aarch64_cortex-a53-24.10.4

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare custom feed directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p customfeeds customfeeds/.packages

          while IFS='|' read -r name repo branch; do
            [ -n "${name}" ] || continue

            echo "Cloning ${name} from ${repo} (${branch})"
            git clone --depth 1 --branch "${branch}" "${repo}" "customfeeds/.sources/${name}"

            src_dir="customfeeds/.sources/${name}"
            copied=0
            for candidate in "$src_dir"/package/* "$src_dir"/packages/* "$src_dir"/luci-*; do
              [ -e "${candidate}" ] || continue
              base="$(basename "${candidate}")"

              if [ -e "customfeeds/.packages/${base}" ]; then
                echo "Duplicate package name detected: ${base}"
                exit 1
              fi

              cp -a "${candidate}" "customfeeds/.packages/${base}"
              copied=1
            done

            if [ "${copied}" -eq 0 ]; then
              echo "No packages found in feed source: ${name}"
              exit 1
            fi
          done <<< "${CUSTOM_FEEDS}"

      - name: Build
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}
          FEEDNAME: ${{ env.CUSTOM_FEED_NAME }}
          FEED_DIR: ${{ github.workspace }}/customfeeds/.packages
          PACKAGES: ${{ env.PACKAGES }}
          BUILD_LOG: 1
          INDEX: 1

      - name: Store packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-packages
          path: |
            bin/packages/**/packages/*.ipk
            logs/**
